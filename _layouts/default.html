<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <p class="site-eyebrow">Leiden University &middot; Faculty of Humanities</p>
        <h1 class="site-title">{{ site.title }}</h1>
        <p class="site-description">{{ site.description }}</p>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/getting-started/' | relative_url }}">Getting Started</a>
          <div class="nav-dropdown">
            <span class="nav-dropdown-toggle">Programs <span class="nav-arrow">&#9662;</span></span>
            <div class="nav-dropdown-menu">
              <div class="nav-dropdown-menu-inner">
                <a href="{{ '/bais/' | relative_url }}">BAIS</a>
                <a href="{{ '/baks/' | relative_url }}">BAKS</a>
                <a href="{{ '/maas/' | relative_url }}">MAAS</a>
                <a href="{{ '/mair/' | relative_url }}">MAIR</a>
              </div>
            </div>
          </div>
          <a href="{{ '/assessment-standards/' | relative_url }}">Assessment Standards</a>
          <a href="{{ '/ethics/' | relative_url }}">Ethics &amp; Policies</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; Dr. Steven Denney &middot; Leiden University &middot; Faculty of Humanities</p>
      </div>
    </footer>
  </body>
</html>
